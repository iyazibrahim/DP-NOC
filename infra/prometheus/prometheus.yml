global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: blackbox-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["blackbox-exporter:9115"]

# Website HTTP probes — generated by noc-app into noc_runtime/website-probes.yml
scrape_config_files:
  - /etc/prometheus/runtime/website-probes.yml

