global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: blackbox-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["blackbox-exporter:9115"]

  # Website probes: add static_configs targets when site websiteTargets are configured.
  # (Seed sites ship with empty websiteTargets.)

