groups:
  - name: noc-site-alerts
    rules:
      - alert: SiteUplinkDown
        expr: |
          (probe_success{check="wan_dns"} == 0)
          or
          (probe_success{check="wan_vps"} == 0)
        for: 2m
        labels:
          severity: critical
          site: "{{ $labels.site }}"
        annotations:
          summary: "Uplink / internet check failed (site={{ $labels.site }}, check={{ $labels.check }})"

      - alert: SiteWebsiteDown
        expr: probe_success{check="website"} == 0
        for: 2m
        labels:
          severity: critical
          site: "{{ $labels.site }}"
        annotations:
          summary: "Website check failing (site={{ $labels.site }}, target={{ $labels.instance }})"

      - alert: SiteCollectorDown
        expr: |
          (
            up{job=~"site_host|integrations/unix"} == 0
          )
        for: 3m
        labels:
          severity: critical
          site: "{{ $labels.site }}"
        annotations:
          summary: "Collector offline (site={{ $labels.site }}, device={{ $labels.device }}, instance={{ $labels.instance }})"

      - alert: SiteLocalDeviceDown
        expr: snmp_up{site=~".+"} == 0
        for: 5m
        labels:
          severity: warning
          site: "{{ $labels.site }}"
          device: "{{ $labels.device }}"
        annotations:
          summary: "Local device SNMP check failing (site={{ $labels.site }}, device={{ $labels.device }})"

