# Valid Alertmanager 0.28 config.
# Default receiver is a no-op so the stack starts without Telegram/SMTP secrets.
# When ready, uncomment telegram/email blocks and set real values
# (Telegram chat_id must be a number, e.g. -1001234567890).

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "site"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # Uncomment and fill when you have credentials:
    #
    # telegram_configs:
    #   - bot_token: "123456:ABC-DEF"
    #     chat_id: -1001234567890
    #     send_resolved: true
    #     parse_mode: "HTML"
    #
    # email_configs:
    #   - to: "ops@example.com"
    #     from: "alertmanager@noc.local"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "user"
    #     auth_password: "pass"
    #     send_resolved: true

inhibit_rules: []
