global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "site"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  # v1: we will send resolved notifications too, so the wallboard has
  # a complete operational story.
  send_resolved: true

receivers:
  - name: default
    telegram_configs:
      - bot_token: "CHANGE_ME_TELEGRAM_BOT_TOKEN"
        chat_id: "CHANGE_ME_TELEGRAM_CHAT_ID"
        send_resolved: true
        parse_mode: "HTML"

    email_configs:
      - to: "CHANGE_ME_ALERT_EMAIL_TO"
        from: "alertmanager@noc.local"
        smarthost: "CHANGE_ME_SMARTHOST:587"
        send_resolved: true
        auth_username: "CHANGE_ME_SMARTHOST_USERNAME"
        auth_password: "CHANGE_ME_SMARTHOST_PASSWORD"


inhibit_rules: []

