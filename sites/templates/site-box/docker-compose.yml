# Alloy site collector for NUC / site box (local: cd here && docker compose up).
#
# DOKPLOY: do NOT use this file as Compose Path. Use repo-root:
#   docker-compose.site-box.yml
# Otherwise `.:/data` can mount the whole monorepo and Console fails with
# "generate-config.sh not found in data directory".
#
# WHY COLLECTOR GOES DOWN AFTER REDEPLOY:
# Dokploy replaces the git checkout — a Setup-written .env in the project folder is LOST.
# Fix: put metrics secrets in Dokploy → Environment (they survive redeploy), AND use the
# named volume below for collector token / devices.json / .env backup.
#
# Dokploy Environment (set once — required for Alloy metrics after redeploy):
#   CENTRAL_REMOTE_WRITE_URL=https://metrics.iyazbrhm.cloud/api/v1/write
#   CF_ACCESS_CLIENT_ID=...
#   CF_ACCESS_CLIENT_SECRET=...
#   SITE_NAME=site-1
#   HOST_DEVICE_ID=site-1-nuc
#   PING_TARGET_1=1.1.1.1
#   PING_TARGET_2=...
# Optional (or set once in Collector Console — stored in volume):
#   NOC_API_URL=https://noc.iyazbrhm.cloud
#   COLLECTOR_TOKEN=nocc_...

x-collector-env: &collector-env
  CENTRAL_REMOTE_WRITE_URL: ${CENTRAL_REMOTE_WRITE_URL:-}
  CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
  CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
  SITE_NAME: ${SITE_NAME:-site-1}
  HOST_DEVICE_ID: ${HOST_DEVICE_ID:-site-1-nuc}
  PING_TARGET_1: ${PING_TARGET_1:-1.1.1.1}
  PING_TARGET_2: ${PING_TARGET_2:-139.99.88.174}
  NOC_API_URL: ${NOC_API_URL:-}
  COLLECTOR_TOKEN: ${COLLECTOR_TOKEN:-}
  SCRAPE_INTERVAL_SEC: ${SCRAPE_INTERVAL_SEC:-15}
  SYNC_INTERVAL_SEC: ${SYNC_INTERVAL_SEC:-90}

services:
  collector-console:
    build:
      # Parent folder so Dockerfile can COPY generate-config.sh into the image
      context: .
      dockerfile: collector-console/Dockerfile
      args:
        # Avoid flaky docker.io pulls on the NUC; AWS public mirror of official node
        NODE_IMAGE: public.ecr.aws/docker/library/node:20-bookworm-slim
    container_name: noc_collector_console
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - .:/data
      # Survives Dokploy redeploy (Setup token, devices.json, .env backup)
      - noc_sitebox_state:/state
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      <<: *collector-env
      DATA_DIR: /data
      STATE_DIR: /state
      SYNC_INTERVAL_SEC: ${SYNC_INTERVAL_SEC:-90}
      PORT: "8090"

  # Pin: grafana/alloy:v1.5.1 — do not bump casually.
  # v1.5.1 has no config_merge_strategy; SNMP requires full snmp.yml (see generate-config.sh).
  alloy:
    image: grafana/alloy:v1.5.1
    container_name: noc_site_alloy
    restart: unless-stopped
    pid: host
    cap_add:
      - NET_RAW
    network_mode: host
    # Dokploy Environment is injected here — survives redeploy
    environment:
      <<: *collector-env
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - ./blackbox.yml:/etc/alloy/blackbox.yml:ro
      - ./snmp.yml:/etc/alloy/snmp.yml:ro
      - /:/rootfs:ro
    working_dir: /etc/alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=127.0.0.1:12345
    depends_on:
      - collector-console

volumes:
  noc_sitebox_state:
