# Alloy site collector for NUC / site box (one site at a time).
# Configure via Collector Console (http://<collector-ip>:8090) or deploy.sh.
# Inventory sync runs automatically in collector-console (no cron required).
#
# Dokploy: this compose has TWO services. If you only see noc_site_alloy:
#   1) Update your Patches → docker-compose.yml to match THIS file (include collector-console)
#   2) Ensure the collector-console/ folder is in the deployed git source (not only patches)
#   3) Redeploy / rebuild so Dokploy builds collector-console from ./collector-console/Dockerfile
#   4) Publish port 8090 on the LAN only (do not put Collector Console on a public domain)

services:
  # Web UI for setup + auto-sync (LAN :8090)
  collector-console:
    build:
      context: ./collector-console
      dockerfile: Dockerfile
    container_name: noc_collector_console
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # Same folder Alloy mounts from — .env, devices.json, snmp.yml, config.alloy, scripts
      - .:/data
      # Needed to recreate Alloy after inventory sync
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATA_DIR: /data
      SYNC_INTERVAL_SEC: "90"
      PORT: "8090"

  # SNMP + ICMP + host metrics → central Prometheus
  alloy:
    image: grafana/alloy:v1.5.1
    container_name: noc_site_alloy
    restart: unless-stopped
    pid: host
    cap_add:
      - NET_RAW
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - ./blackbox.yml:/etc/alloy/blackbox.yml:ro
      - ./snmp.yml:/etc/alloy/snmp.yml:ro
      # Host metrics — REQUIRED for CPU/RAM/disk
      - /:/rootfs:ro
    working_dir: /etc/alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=127.0.0.1:12345
