# SNMPv2c config for Grafana Alloy prometheus.exporter.snmp (Alloy v1.5.x).
# Do NOT use config_merge_strategy — that attribute requires newer Alloy.
# This file fully replaces the embedded snmp_exporter config (default behavior).
#
# Set community to match your Fortinet / switch SNMPv2c string.

auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2.2.1.2     # ifDescr
      - 1.3.6.1.2.1.2.2.1.8     # ifOperStatus
      - 1.3.6.1.2.1.2.2.1.5     # ifSpeed
      - 1.3.6.1.2.1.31.1.1.1.1  # ifName
      - 1.3.6.1.2.1.31.1.1.1.6  # ifHCInOctets
      - 1.3.6.1.2.1.31.1.1.1.10 # ifHCOutOctets
    metrics:
      - name: ifDescr
        oid: 1.3.6.1.2.1.2.2.1.2
        type: DisplayString
        help: A textual description of the interface
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: The current operational state of the interface
        indexes:
          - labelname: ifIndex
            type: gauge
        enum_values:
          1: up
          2: down
          3: testing
          4: unknown
          5: dormant
          6: notPresent
          7: lowerLayerDown
      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: Estimate of the interface bandwidth in bits per second
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
        help: Interface name
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: The total number of octets received on the interface
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: The total number of octets transmitted out of the interface
        indexes:
          - labelname: ifIndex
            type: gauge
