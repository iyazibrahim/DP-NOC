# Central NOC stack for Dokploy (or local docker compose).
# Dokploy should publish:
#   - noc-app  → e.g. https://noc.example.com  (API + React UI)
#   - grafana  → e.g. https://grafana.example.com (optional)
# Do NOT publish Prometheus, Alertmanager, or Blackbox publicly.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: noc_prometheus
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/prometheus/docker-entrypoint.sh"]
    # Retention flags are read from noc_runtime/prometheus-retention.flags on container start.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - ./infra/prometheus/docker-entrypoint.sh:/etc/prometheus/docker-entrypoint.sh:ro
      - prometheus_data:/prometheus
      - noc_runtime:/etc/prometheus/runtime
    networks:
      - noc_net

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: noc_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/runtime/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - noc_runtime:/etc/alertmanager/runtime:ro
      - alertmanager_data:/alertmanager
    networks:
      - noc_net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: noc_grafana
    restart: unless-stopped
    # Host 3000 is often taken (other Grafana/Node apps). Map to 3001 locally.
    # Dokploy should target container port 3000 on the internal network.
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - noc_net

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: noc_blackbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox-exporter/config.yml:ro
    networks:
      - noc_net

  noc-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noc_app
    restart: unless-stopped
    depends_on:
      - prometheus
      - alertmanager
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=dev-noc-jwt-secret
      - JWT_ISSUER=noc-api
      - JWT_AUDIENCE=noc-wallboard
      - OPERATOR_USERNAME=admin
      - OPERATOR_PASSWORD=admin
      - PROMETHEUS_BASE_URL=http://prometheus:9090
      - ALERTMANAGER_BASE_URL=http://alertmanager:9093
      - GRAFANA_PUBLIC_URL=http://localhost:3001
      # Optional: docker restart noc_prometheus (requires Docker socket mount on VPS)
      # - PROMETHEUS_APPLY_CMD=docker restart noc_prometheus
      # - ALERTMANAGER_APPLY_CMD=docker restart noc_alertmanager
    volumes:
      - noc_layouts:/app/data/layouts
      - noc_runtime:/app/data/runtime
      - noc_exports:/app/data/exports
    networks:
      - noc_net

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  noc_layouts:
  noc_runtime:
  noc_exports:

networks:
  noc_net:
    driver: bridge
